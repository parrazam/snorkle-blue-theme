      # ── Energy dashboard ─────────────────────────────────────────────────
      energy-grid-consumption-color: "#5BB3F0"
      energy-grid-return-color: "#66BB6A"
      energy-solar-color: "#F3A724"
      energy-battery-in-color: "#0595F9"
      energy-battery-out-color: "#A7D2F0"
      energy-gas-color: "#FF7043"

      # ── History graph ────────────────────────────────────────────────────
