      # ── Material Design 3 system colors ──────────────────────────────────
      md-sys-color-primary: "#5BB3F0"
      md-sys-color-on-primary: "#0A1520"
      md-sys-color-primary-container: "#023B63"
      md-sys-color-on-primary-container: "#A7D2F0"
      md-sys-color-secondary: "#F3A724"
      md-sys-color-on-secondary: "#0A1520"
      md-sys-color-surface: "#0A1520"
      md-sys-color-on-surface: "#E8EDF2"
      md-sys-color-on-surface-variant: "#94A8BC"
      md-sys-color-surface-container: "#122030"
      md-sys-color-surface-container-high: "#1A2D40"
      md-sys-color-surface-container-highest: "#223A52"
      md-sys-color-surface-container-low: "#0E1A28"
      md-sys-color-surface-container-lowest: "#0A1520"
      md-sys-color-outline: "#2A4560"
      md-sys-color-outline-variant: "#243D55"

      # ── Tabs / Shoelace (2025.5+) ─────────────────────────────────────────
