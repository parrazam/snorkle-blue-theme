      table-row-alternative-background-color: "#0E1A28"
      data-table-background-color: "#122030"

      # ── Misc ─────────────────────────────────────────────────────────────
      paper-toast-background-color: "#E8EDF2"
      paper-toast-color: "#0A1520"
      mdc-theme-primary: "#5BB3F0"
      mdc-theme-secondary: "#F3A724"
